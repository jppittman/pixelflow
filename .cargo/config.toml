[alias]
# Build and run the bundled macOS app (required for keyboard input on macOS)
bundle-run = "run --package xtask --release -- bundle-run"
# Bake eigenstructure binary to Rust consts
bake-eigen = "run --package xtask --release -- bake-eigen"

[build]
# Relaxed FP math for faster SIMD - allows FMA contraction and unsafe FP opts.
#
# NOTE: do NOT add `-C target-cpu=native` here. It enables the AVX-512 backend,
# which widens `Field` to 512 bits — but the x86-64 JIT (`KernelFn`) is fixed at
# 128-bit `__m128`, so the JIT output can no longer interoperate with the Field
# pipeline (e.g. pixelflow-pipeline's scanline bins fail to compile). The
# engine's x86-64 path is 128-bit/SSE2 by construction; native must be opted
# into per-build only when the JIT is not used.
rustflags = [
    "-C", "llvm-args=-fp-contract=fast",
]
